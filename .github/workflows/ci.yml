name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality-gate-1:
    name: Gate 1 — Structure & Contract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (required for typecheck)
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # 빌드만 실행, DB 연결은 런타임
          # TODO: 실제 비밀값이 필요하면 GitHub Secrets 로 교체
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?schema=public"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-dummy-secret"
